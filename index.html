<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Extractor — Cyber UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090F1A; --card:#101826; --input:#121D2D; --accent:#00BFFF; --glow:#1E90FF;
  --border:rgba(0,191,255,.28); --text:#F5F7FA; --text-secondary:#A8B3C7;
  --radius-card:18px; --radius-input:16px; --radius-url:16px;
  --shadow-normal:0 0 20px rgba(0,191,255,.08); --shadow-hover:0 0 28px rgba(0,191,255,.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{ background:var(--bg); color:var(--text); font-family:'Poppins','Inter','Segoe UI',sans-serif; font-weight:500; -webkit-font-smoothing:antialiased; min-height:100vh; }
.app{ max-width:1200px; margin:0 auto; padding:36px 28px 80px; }

/* ===== SOURCE SELECTOR ===== */
.source-selector{ position:relative; background:var(--card); border:1px solid var(--border); border-radius:var(--radius-card); padding:18px 56px 22px; box-shadow:var(--shadow-normal); margin-bottom: 24px;}
.source-track-wrap{ overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none; }
.source-track-wrap::-webkit-scrollbar{display:none;}
.source-track{ display:flex; gap:12px; flex-wrap:nowrap; white-space:nowrap; }
.source-pill{ flex:0 0 auto; display:inline-flex; align-items:center; gap:9px; background:var(--input); border:1.5px solid rgba(0,191,255,.12); border-radius:13px; padding:11px 20px; color:var(--text); font-family:inherit; font-weight:600; font-size:13.5px; cursor:pointer; transition:border-color .25s, box-shadow .25s, transform .2s; user-select: none; -webkit-user-select: none; }
.source-pill:hover{ border-color:rgba(0,191,255,.38); transform:translateY(-1px); }
.source-pill.active{ border-color:var(--accent); animation:pillPulse 2.4s ease-in-out infinite; }
@keyframes pillPulse{ 0%,100%{box-shadow:0 0 12px rgba(0,191,255,.28);} 50%{box-shadow:0 0 22px rgba(0,191,255,.48);} }
.pill-logo{ width:24px;height:24px;border-radius:6px; display:flex;align-items:center;justify-content:center; font-size:13px;flex-shrink:0; }
.pill-logo--premium{background:linear-gradient(135deg,#ff7a59,#ffd166,#00BFFF); color: #000; font-size: 14px;}
.scroll-arrow{ position:absolute;top:18px; width:32px;height:32px;border-radius:50%; border:1px solid var(--border); background:var(--input);color:var(--accent); display:flex;align-items:center;justify-content:center; cursor:pointer;z-index:2; transition:box-shadow .25s, background .25s; }
.scroll-arrow svg{width:15px;height:15px;}
.scroll-arrow:hover{box-shadow:var(--shadow-hover);background:rgba(0,191,255,.08);}
.scroll-arrow--left{left:13px;} .scroll-arrow--right{right:13px;}
.source-indicator-track{ position:relative;height:2px; background:rgba(0,191,255,.1); margin-top:14px;border-radius:2px; }
.source-indicator{ position:absolute;top:-3px;left:0; height:2px;width:90px; background:var(--accent); box-shadow:0 0 10px var(--glow); border-radius:2px; transition:left .35s ease, width .35s ease; }
.source-indicator::before{ content:"";position:absolute;left:0;top:-3px; width:8px;height:8px;border-radius:50%; background:var(--accent);box-shadow:0 0 8px var(--glow); }

/* ===== SEARCH ROW & BOXES ===== */
.search-row{display:flex;gap:16px;}
.search-box{position:relative;flex:1 1 65%;display:flex;align-items:center;}
.search-box input{ width:100%; background:var(--input); border:1.5px solid var(--border); border-radius:var(--radius-input); color:var(--text); font-family:inherit;font-weight:500;font-size:15px; padding:15px 48px 15px 20px;outline:none; transition:border-color .25s, box-shadow .25s; }
.search-box input::placeholder{color:var(--text-secondary);}
.search-box input:focus{ border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,191,255,.1), var(--shadow-hover); }
.icon-search{ position:absolute;right:17px; width:19px;height:19px;color:var(--accent); cursor:pointer; }
.suggestions-box { position:absolute; top:calc(100% + 8px); left:0; right:0; background:var(--card); border:1px solid var(--border); border-radius:13px; box-shadow:0 10px 30px rgba(0,0,0,0.8), var(--shadow-hover); max-height:380px; overflow-y:auto; z-index:20; display:none; }
.suggestion-item { display:flex; align-items:center; gap:16px; padding:12px 14px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.05); transition:background 0.2s; }
.suggestion-item:last-child { border-bottom:none; }
.suggestion-item:hover { background:rgba(0,191,255,0.1); }
.suggestion-img { width:48px; height:68px; object-fit:cover; border-radius:6px; background:#000; box-shadow:0 2px 8px rgba(0,0,0,0.5); }
.suggestion-title { font-size:14.5px; font-weight:600; color:var(--text); }
.suggestion-loading { padding: 14px; text-align: center; color: var(--text-secondary); font-size: 13px; }

.quality-box{position:relative;flex:1 1 35%;min-width:190px;}
.quality-trigger{ width:100%;display:flex;align-items:center;justify-content:space-between; background:var(--input);border:1.5px solid var(--border); border-radius:var(--radius-input);color:var(--text); font-family:inherit;font-weight:500;font-size:15px; padding:15px 20px;cursor:pointer; transition:border-color .25s, box-shadow .25s; }
.quality-trigger:hover,.quality-box.open .quality-trigger{ border-color:var(--accent);box-shadow:var(--shadow-hover); }
.quality-trigger:disabled{opacity:0.5;cursor:not-allowed;}
.icon-chevron{ width:17px;height:17px;color:var(--accent); transition:transform .25s; }
.quality-box.open .icon-chevron{transform:rotate(180deg);}
.quality-menu{ position:absolute;top:calc(100% + 7px);left:0;right:0; background:var(--card);border:1px solid var(--border); border-radius:13px; box-shadow:0 10px 30px rgba(0,0,0,.5), var(--shadow-hover); padding:7px;max-height:0;overflow:hidden; opacity:0;transform:translateY(-6px); transition:max-height .3s ease, opacity .25s, transform .25s; z-index:10; }
.quality-box.open .quality-menu{ max-height:320px;opacity:1;transform:translateY(0);overflow-y:auto; }
.quality-item{ display:block;width:100%;text-align:left; background:transparent;border:none;color:var(--text); font-family:inherit;font-weight:500;font-size:14px; padding:10px 14px;border-radius:8px;cursor:pointer; transition:background .2s, color .2s; }
.quality-item:hover{background:rgba(0,191,255,.1);color:var(--accent);}

/* ===== SECTION HEADING & COPY ALL ===== */
.section-heading{ display:flex;align-items:center;gap:14px; margin:44px 0 26px; }
.heading-line{ flex:1;height:1px; background:linear-gradient(90deg,transparent,var(--accent) 50%,transparent); box-shadow:0 0 8px var(--glow); }
.heading-dot{ width:7px;height:7px;border-radius:50%; background:var(--accent);box-shadow:0 0 10px var(--glow);flex-shrink:0; }
.heading-text{ font-weight:700;font-size:19px;letter-spacing:1.5px; text-transform:uppercase;color:var(--accent); text-shadow:0 0 16px rgba(0,191,255,.45);white-space:nowrap; }
.btn-copy-all { background: rgba(0,191,255,.15); color: var(--accent); border: 1.5px solid var(--accent); padding: 6px 14px; border-radius: 8px; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 12px; cursor: pointer; transition: all 0.2s; display: none; align-items: center; gap: 6px; }
.btn-copy-all:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--glow); }
.btn-copy-all svg { width: 14px; height: 14px; }

/* ===== URL GRID & EPISODE HEADERS (🌟 NEW) ===== */
.episode-header { width: 100%; background: rgba(0, 191, 255, 0.1); color: var(--accent); padding: 12px 18px; border-radius: 12px; font-weight: 700; font-size: 15px; margin: 36px 0 18px 0; border: 1px solid rgba(0, 191, 255, 0.2); text-transform: uppercase; letter-spacing: 1.5px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow-normal); }
.episode-header::before { content: "📺"; font-size: 18px; }
.ep-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; }

.url-card{ position:relative; border-radius:var(--radius-url); overflow:hidden; isolation:isolate; transition:transform .25s, box-shadow .25s; cursor:default; }
.url-card:hover{ transform:translateY(-3px); }
.card-header{ position:relative; z-index:2; padding:12px 18px 10px; display:flex; align-items:center; gap:9px; }
.card-header-icon{ width:28px;height:28px;border-radius:8px; background:rgba(255,255,255,.18); display:flex;align-items:center;justify-content:center; font-size:14px;flex-shrink:0; }
.card-title{ font-weight:700;font-size:13px;letter-spacing:.6px; text-transform:uppercase;color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.3); }
.card-badge{ margin-left:auto; background:rgba(255,255,255,.2); border-radius:20px; padding:3px 10px; font-size:11px;font-weight:600;color:#fff; letter-spacing:.3px; }
.card-body{ position:relative; z-index:2; background:rgba(10,14,24,.82); backdrop-filter:blur(4px); padding:14px 18px; display:flex; align-items:center; gap:12px; }
.url-text{ flex:1; font-family:'Inter',sans-serif; font-size:13.5px;font-weight:500; color:#d4e8f7; white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.copy-btn{ flex-shrink:0; width:34px;height:34px; display:flex;align-items:center;justify-content:center; background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.3); border-radius:9px; color:#fff;cursor:pointer; transition:background .2s, transform .2s, box-shadow .2s; }
.copy-btn svg{width:15px;height:15px;}
.copy-btn:hover{ background:rgba(255,255,255,.22); transform:scale(1.08); box-shadow:0 0 12px rgba(255,255,255,.2); }
.copy-btn:active{transform:scale(.94);}

.url-card::before{ content:""; position:absolute;inset:0; border-radius:var(--radius-url); padding:1.5px; background:conic-gradient(from 0deg, transparent 0deg,transparent 260deg, rgba(255,255,255,.9) 300deg, #fff 330deg, rgba(255,255,255,.9) 350deg, transparent 360deg ); -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite:xor; mask-composite:exclude; animation:borderTravel 4s linear infinite; z-index:1;pointer-events:none; }
@keyframes borderTravel{to{transform:rotate(360deg);}}

.url-card[data-color="blue"] .card-header{ background:linear-gradient(135deg,#0052cc,#00BFFF); box-shadow:0 4px 20px rgba(0,120,255,.35); }
.url-card[data-color="blue"]{ box-shadow:0 0 0 1.5px rgba(0,191,255,.4), 0 8px 30px rgba(0,120,255,.2); }
.url-card[data-color="purple"] .card-header{ background:linear-gradient(135deg,#6a0dad,#c84bff); box-shadow:0 4px 20px rgba(180,50,255,.35); }
.url-card[data-color="purple"]{ box-shadow:0 0 0 1.5px rgba(180,50,255,.4), 0 8px 30px rgba(130,0,200,.2); }
.url-card[data-color="green"] .card-header{ background:linear-gradient(135deg,#006633,#00e676); box-shadow:0 4px 20px rgba(0,200,100,.3); }
.url-card[data-color="green"]{ box-shadow:0 0 0 1.5px rgba(0,220,100,.38), 0 8px 30px rgba(0,180,80,.18); }
.url-card[data-color="orange"] .card-header{ background:linear-gradient(135deg,#b34700,#ff9a3c); box-shadow:0 4px 20px rgba(255,130,0,.3); }
.url-card[data-color="orange"]{ box-shadow:0 0 0 1.5px rgba(255,140,0,.4), 0 8px 30px rgba(200,100,0,.2); }
.url-card[data-color="pink"] .card-header{ background:linear-gradient(135deg,#880e4f,#f06292); box-shadow:0 4px 20px rgba(240,98,146,.3); }
.url-card[data-color="pink"]{ box-shadow:0 0 0 1.5px rgba(240,100,150,.4), 0 8px 30px rgba(180,50,100,.2); }
.url-card[data-color="teal"] .card-header{ background:linear-gradient(135deg,#004d40,#1de9b6); box-shadow:0 4px 20px rgba(0,230,180,.3); }
.url-card[data-color="teal"]{ box-shadow:0 0 0 1.5px rgba(0,230,180,.38), 0 8px 30px rgba(0,180,140,.18); }

/* ===== TOAST & FETCH OVERLAY ===== */
.toast{ position:fixed;bottom:34px;left:50%; transform:translateX(-50%) translateY(20px); background:var(--card);border:1px solid var(--accent); color:var(--text);font-family:'Poppins',sans-serif; font-weight:600;font-size:13.5px; padding:13px 26px;border-radius:13px; box-shadow:0 0 24px rgba(0,191,255,.35); opacity:0;pointer-events:none; transition:opacity .3s, transform .3s;z-index:100; }
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.fetch-overlay{ display:none; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:48px 20px; }
.fetch-overlay.active{ display:flex; }
.fetch-radar{ position:relative; width:110px; height:110px; }
.fetch-radar-ring{ position:absolute;inset:0; border-radius:50%; border:2px solid transparent; animation:radarSpin 1.2s linear infinite; }
.fetch-radar-ring:nth-child(1){ border-top-color:var(--accent); border-right-color:rgba(0,191,255,.3); animation-duration:1.2s; }
.fetch-radar-ring:nth-child(2){ inset:12px; border-top-color:rgba(0,191,255,.7); border-left-color:rgba(0,191,255,.2); animation-duration:.9s; animation-direction:reverse; }
.fetch-radar-ring:nth-child(3){ inset:26px; border-top-color:rgba(0,191,255,.5); border-bottom-color:rgba(0,191,255,.15); animation-duration:1.5s; }
@keyframes radarSpin{ to{ transform:rotate(360deg); } }
.fetch-radar-core{ position:absolute; inset:38px; border-radius:50%; background:radial-gradient(circle, rgba(0,191,255,.35) 0%, rgba(0,191,255,.05) 70%, transparent 100%); animation:corePulse 1.2s ease-in-out infinite; display:flex;align-items:center;justify-content:center; font-size:18px; }
@keyframes corePulse{ 0%,100%{ transform:scale(1); opacity:.7; box-shadow:0 0 10px rgba(0,191,255,.3); } 50%{ transform:scale(1.15); opacity:1; box-shadow:0 0 22px rgba(0,191,255,.6); } }
.fetch-scan-beam{ width:100%; max-width:420px; height:3px; background:var(--card); border-radius:4px; overflow:hidden; position:relative; border:1px solid rgba(0,191,255,.15); }
.fetch-scan-beam::after{ content:""; position:absolute;top:0;left:-60%; width:60%;height:100%; background:linear-gradient(90deg,transparent,var(--accent),rgba(0,191,255,.4),transparent); animation:beamSlide 1.4s ease-in-out infinite; }
@keyframes beamSlide{ 0%{ left:-60%; } 100%{ left:110%; } }
.fetch-progress-wrap{ width:100%;max-width:420px; }
.fetch-progress-bar{ height:5px; background:rgba(0,191,255,.1); border-radius:6px; overflow:hidden; border:1px solid rgba(0,191,255,.15); }
.fetch-progress-fill{ height:100%;width:0%; background:linear-gradient(90deg,var(--glow),var(--accent),#7df9ff); border-radius:6px; box-shadow:0 0 12px rgba(0,191,255,.6); transition:width .18s ease; }
.fetch-progress-label{ display:flex;justify-content:space-between; margin-top:7px; font-size:11.5px;font-weight:500;color:var(--text-secondary);letter-spacing:.3px; }
.fetch-status{ font-size:13px;font-weight:600;letter-spacing:.8px; color:var(--accent);text-transform:uppercase; text-shadow:0 0 12px rgba(0,191,255,.4); min-height:20px; animation:statusPulse 1.4s ease-in-out infinite; }
@keyframes statusPulse{ 0%,100%{ opacity:1; } 50%{ opacity:.5; } }
.fetch-particles{ position:relative;width:200px;height:30px;overflow:visible; }
.fetch-particle{ position:absolute; width:4px;height:4px;border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent); animation:particleFloat 2s ease-in-out infinite; opacity:0; }
@keyframes particleFloat{ 0%{ opacity:0; transform:translateY(0) scale(0); } 20%{ opacity:1; transform:translateY(-8px) scale(1); } 80%{ opacity:.6; transform:translateY(-22px) scale(.7); } 100%{ opacity:0; transform:translateY(-32px) scale(0); } }
.url-card{ opacity:0; transform:translateY(24px) scale(.97); }
.url-card.card-visible{ animation:cardIn .45s cubic-bezier(.22,.68,0,1.2) forwards; }
@keyframes cardIn{ to{ opacity:1; transform:translateY(0) scale(1); } }

/* 🌟 NEW: DOMAIN UPDATE MODAL 🌟 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); backdrop-filter:blur(5px); z-index:999; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .3s; }
.modal-overlay.active { opacity:1; pointer-events:auto; }
.modal-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius-card); padding:24px; width:90%; max-width:400px; box-shadow:var(--shadow-hover); transform:translateY(20px); transition:transform .3s; }
.modal-overlay.active .modal-box { transform:translateY(0); }
.modal-title { color:var(--accent); font-size:16px; margin-bottom:16px; text-transform:uppercase; letter-spacing:1px; font-weight:700;}
.modal-input { width:100%; background:var(--input); border:1.5px solid rgba(0,191,255,.1); border-radius:12px; color:var(--text); padding:12px 16px; font-family:inherit; outline:none; margin-bottom:20px; transition:border-color .25s;}
.modal-input:focus { border-color:var(--accent); box-shadow:0 0 10px rgba(0,191,255,.2); }
.modal-actions { display:flex; gap:12px; justify-content:flex-end; }
.btn-cancel { background:transparent; color:var(--text-secondary); border:none; cursor:pointer; font-weight:600; padding:8px 16px; font-family:inherit;}
.btn-save { background:rgba(0,191,255,.15); color:var(--accent); border:1px solid var(--accent); border-radius:8px; padding:8px 16px; cursor:pointer; font-weight:600; font-family:inherit; transition:all .2s; }
.btn-save:hover { background:var(--accent); color:#000; box-shadow:0 0 15px var(--glow); }

@media(max-width:900px){.app{padding:28px 18px 64px;}}
@media(max-width:680px){ .search-row{flex-direction:column;} .search-box input,.quality-trigger{padding:13px 16px;font-size:14px;} .search-box input{padding-right:42px;} .heading-text{font-size:15px;letter-spacing:1px;} .section-heading{margin:32px 0 20px;} }
@media(max-width:400px){ .ep-grid{grid-template-columns:1fr;} .search-row{flex-direction:column;} .source-selector{padding:14px 44px 18px;} .scroll-arrow{width:28px;height:28px;} }
</style>
</head>
<body>
<div class="app">

  <div class="source-selector" id="sourceSelector" style="display: block;">
    <button class="scroll-arrow scroll-arrow--left" id="scrollLeft" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="source-track-wrap">
      <div class="source-track" id="sourceTrack">
        <!-- 🌟 Added Data-Id for Long Press 🌟 -->
        <button class="source-pill active" data-website="movies4u" id="movies4uPill" type="button" title="Long press to update domain">
          <span class="pill-logo pill-logo--premium">👑</span>
          <span class="pill-name">Movies4u</span>
        </button>
      </div>
    </div>
    <button class="scroll-arrow scroll-arrow--right" id="scrollRight" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="source-indicator-track">
      <div class="source-indicator" id="sourceIndicator"></div>
    </div>
  </div>

  <div class="search-row">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search movie name + year (e.g. Inception 2010)..." autocomplete="off">
      <svg class="icon-search" id="searchBtn" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div class="suggestions-box" id="suggestionsBox"></div>
    </div>
    <div class="quality-box" id="qualityBox">
      <button class="quality-trigger" id="qualityTrigger" type="button" disabled>
        <span id="qualityLabel">Select Quality</span>
        <svg class="icon-chevron" viewBox="0 0 24 24" fill="none">
          <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="quality-menu" id="qualityMenu"></div>
    </div>
  </div>

  <div id="movieTitleDisplay" style="margin-top:20px; color:var(--text); font-weight:600; text-align:center; display:none;"></div>

  <div class="section-heading">
    <span class="heading-line"></span>
    <span class="heading-dot"></span>
    <span class="heading-text">Final URL Extract</span>
    <button id="copyAllBtn" class="btn-copy-all" type="button">
      <svg viewBox="0 0 24 24" fill="none"><path d="M8 16H6C4.89543 16 4 15.1046 4 14V6C4 4.89543 4.89543 4 6 4H14C15.1046 4 16 4.89543 16 6V8M18 8H10C8.89543 8 8 8.89543 8 10V18C8 19.1046 8.89543 20 10 20H18C19.1046 20 20 19.1046 20 18V10C20 8.89543 19.1046 8 18 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Copy All
    </button>
    <span class="heading-dot" style="margin-left: 14px;"></span>
    <span class="heading-line"></span>
  </div>

  <div class="fetch-overlay" id="fetchOverlay">
    <div class="fetch-radar">
      <div class="fetch-radar-ring"></div>
      <div class="fetch-radar-ring"></div>
      <div class="fetch-radar-ring"></div>
      <div class="fetch-radar-core">🔍</div>
    </div>
    <div class="fetch-scan-beam"></div>
    <div class="fetch-status" id="fetchStatus">Initializing...</div>
    <div class="fetch-progress-wrap">
      <div class="fetch-progress-bar">
        <div class="fetch-progress-fill" id="fetchFill"></div>
      </div>
      <div class="fetch-progress-label">
        <span id="fetchPct">0%</span>
        <span id="fetchStep">Connecting to server</span>
      </div>
    </div>
    <div class="fetch-particles" id="fetchParticles"></div>
  </div>

  <div id="urlGrid" style="display:none;"></div>
</div>

<!-- 🌟 DOMAIN UPDATE MODAL 🌟 -->
<div class="modal-overlay" id="urlModal">
  <div class="modal-box">
    <h3 class="modal-title">Update Website Domain</h3>
    <input type="text" id="newUrlInput" class="modal-input" placeholder="e.g. https://movies4u.com" autocomplete="off" />
    <div class="modal-actions">
      <button id="cancelUrlBtn" class="btn-cancel">Cancel</button>
      <button id="saveUrlBtn" class="btn-save">Update</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied Successfully</div>

<script>
const CARD_COLORS = ['blue','purple','green','orange','pink','teal'];
const CARD_ICONS  = ['🔗','⚡','💾','🖥️','🔄','🚀','🔒'];

let currentMovieLinks = [];
let extractedFinalLinks = [];
let _particleInterval = null;
let typingTimer;

const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const suggestionsBox = document.getElementById('suggestionsBox');
const qualityBox = document.getElementById('qualityBox');
const qualityTrigger = document.getElementById('qualityTrigger');
const qualityLabel = document.getElementById('qualityLabel');
const qualityMenu = document.getElementById('qualityMenu');
const movieTitleDisplay = document.getElementById('movieTitleDisplay');
const fetchOverlay = document.getElementById('fetchOverlay');
const urlGrid = document.getElementById('urlGrid');
const copyAllBtn = document.getElementById('copyAllBtn');

const fetchStatus = document.getElementById('fetchStatus');
const fetchFill = document.getElementById('fetchFill');
const fetchPct = document.getElementById('fetchPct');
const fetchStep = document.getElementById('fetchStep');
const fetchParticles = document.getElementById('fetchParticles');
const sourceIndicator = document.getElementById('sourceIndicator');
const sourceTrack = document.getElementById('sourceTrack');

function copyIconSVG(){ return `<svg viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2.5" stroke="currentColor" stroke-width="1.8"/><path d="M5 15V6.5C5 5.12 6.12 4 7.5 4H15" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`; }

function spawnParticle(){
  const p = document.createElement('div');
  p.className = 'fetch-particle';
  p.style.left  = (Math.random() * 180 + 10) + 'px';
  p.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
  p.style.animationDelay    = (Math.random() * .4) + 's';
  p.style.width = p.style.height = (3 + Math.random() * 3) + 'px';
  const colors = ['#00BFFF','#7df9ff','#c084fc','#00e676','#ff9a3c'];
  p.style.background = colors[Math.floor(Math.random() * colors.length)];
  p.style.boxShadow  = '0 0 6px ' + p.style.background;
  fetchParticles.appendChild(p);
  setTimeout(() => p.remove(), 2400);
}

function moveIndicator(pill){
  if (!pill) return;
  const trackRect = sourceTrack.getBoundingClientRect();
  const pillRect  = pill.getBoundingClientRect();
  const left = pillRect.left - trackRect.left + sourceTrack.parentElement.scrollLeft;
  sourceIndicator.style.left  = left + 'px';
  sourceIndicator.style.width = pillRect.width + 'px';
}

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function simulateProgress(text, stepMsg, pct) {
  fetchOverlay.classList.add('active');
  urlGrid.style.display = 'none';
  copyAllBtn.style.display = 'none';
  if(!_particleInterval) _particleInterval = setInterval(spawnParticle, 220);
  fetchStatus.textContent = text;
  fetchStep.textContent = stepMsg;
  fetchFill.style.width = pct + '%';
  fetchPct.textContent = pct + '%';
}

function hideProgress() {
  clearInterval(_particleInterval);
  _particleInterval = null;
  fetchOverlay.classList.remove('active');
}

// 🌟 LONG PRESS LOGIC FOR DOMAIN UPDATE 🌟
let pressTimer;
const m4uPill = document.getElementById('movies4uPill');
const urlModal = document.getElementById('urlModal');
const newUrlInput = document.getElementById('newUrlInput');

function startPress(e) {
  if (e.type === 'click' && e.detail !== 0) return; // Prevent double trigger
  pressTimer = setTimeout(() => {
    urlModal.classList.add('active');
    newUrlInput.value = ''; // Clear old input
    newUrlInput.focus();
  }, 2000); // 2 seconds hold
}
function cancelPress(e) { clearTimeout(pressTimer); }

m4uPill.addEventListener('mousedown', startPress);
m4uPill.addEventListener('touchstart', startPress);
m4uPill.addEventListener('mouseup', cancelPress);
m4uPill.addEventListener('mouseleave', cancelPress);
m4uPill.addEventListener('touchend', cancelPress);

document.getElementById('cancelUrlBtn').addEventListener('click', () => urlModal.classList.remove('active'));

document.getElementById('saveUrlBtn').addEventListener('click', async () => {
    const newUrl = newUrlInput.value.trim();
    if(!newUrl || !newUrl.startsWith('http')) {
        showToast('Enter valid URL (http/https)');
        return;
    }
    
    try {
        const res = await fetch('/api/update-url', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ newUrl })
        });
        const data = await res.json();
        if(data.success) {
            urlModal.classList.remove('active');
            showToast('Domain Updated Successfully!');
        }
    } catch(e) { showToast('Failed to update domain'); }
});

// Search Suggestions
searchInput.addEventListener('input', () => {
    clearTimeout(typingTimer);
    const q = searchInput.value.trim();
    if (!q) { suggestionsBox.style.display = 'none'; return; }
    
    suggestionsBox.innerHTML = '<div class="suggestion-loading">Searching...</div>';
    suggestionsBox.style.display = 'block';

    typingTimer = setTimeout(async () => {
        try {
            const res = await fetch(`/api/suggest?q=${encodeURIComponent(q)}`);
            const data = await res.json();
            
            if (data.length > 0) {
                suggestionsBox.innerHTML = '';
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.innerHTML = `
                        <img src="${item.img || ''}" class="suggestion-img" onerror="this.style.display='none'">
                        <span class="suggestion-title">${item.title}</span>
                    `;
                    div.onclick = () => {
                        searchInput.value = item.title;
                        suggestionsBox.style.display = 'none';
                        triggerFullSearch(null, item.link, item.title);
                    };
                    suggestionsBox.appendChild(div);
                });
            } else {
                suggestionsBox.innerHTML = '<div class="suggestion-loading">No movies found</div>';
            }
        } catch (e) { suggestionsBox.style.display = 'none'; }
    }, 300); 
});

document.addEventListener('click', (e) => {
    if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
        suggestionsBox.style.display = 'none';
    }
});

// Full Search Logic
async function triggerFullSearch(queryStr, directUrl = null, directTitle = null) {
  simulateProgress('Loading Movie...', 'Fetching direct movie details', 30);
  qualityMenu.innerHTML = '';
  qualityLabel.textContent = "Loading qualities...";
  qualityTrigger.disabled = true;
  extractedFinalLinks = [];
  
  try {
    let fetchUrl = `/api/search?q=${encodeURIComponent(queryStr || searchInput.value.trim())}`;
    if (directUrl) fetchUrl = `/api/search?url=${encodeURIComponent(directUrl)}&title=${encodeURIComponent(directTitle)}`;
    
    const res = await fetch(fetchUrl);
    const data = await res.json();
    
    hideProgress();
    
    if(data.error) {
      qualityLabel.textContent = "No result found";
      return showToast(data.error);
    }
    
    movieTitleDisplay.style.display = "block";
    movieTitleDisplay.textContent = `🎬 Found: ${data.title}`;
    currentMovieLinks = data.links;
    
    if(data.qualities.length === 0) {
      qualityLabel.textContent = "No qualities found";
      return;
    }
    
    qualityLabel.textContent = "Select Quality";
    qualityTrigger.disabled = false;
    
    data.qualities.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'quality-item';
      btn.type = 'button';
      btn.textContent = q;
      btn.onclick = () => selectQuality(q);
      qualityMenu.appendChild(btn);
    });
  } catch(e) {
    hideProgress();
    showToast("Error searching movie");
  }
}

searchBtn.addEventListener('click', () => {
    const q = searchInput.value.trim();
    if(q) {
        suggestionsBox.style.display = 'none';
        triggerFullSearch(q);
    }
});
searchInput.addEventListener('keypress', e => { 
    if(e.key === 'Enter') {
        suggestionsBox.style.display = 'none';
        triggerFullSearch(searchInput.value.trim());
    } 
});

async function selectQuality(quality) {
  qualityLabel.textContent = quality;
  qualityBox.classList.remove('open');
  
  const targetLinks = currentMovieLinks.filter(l => l.quality === quality);
  if(targetLinks.length === 0) return showToast("No links for this quality");
  
  simulateProgress('Extracting URLs...', 'Bypassing Server Walls (Superfast)', 65);
  
  try {
    const res = await fetch('/api/extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ links: targetLinks })
    });
    const data = await res.json();

// 🔥 Agar backend se message aaya hai ki links nahi hain, toh wahi dikhao
if (data.message) {
    hideProgress();
    showToast(data.message);
    document.getElementById('urlGrid').innerHTML = `<div style="color: #ff4d4d; text-align: center; font-size: 16px; padding: 20px; width: 100%;">${data.message}</div>`;
    return;
}

extractedFinalLinks = data.finalLinks;
    
    simulateProgress('Done!', 'All links extracted', 100);
    setTimeout(() => {
        hideProgress();
        renderCards(); // NEW GROUPED RENDER LOGIC
    }, 400);
  } catch(e) {
    hideProgress();
    showToast("Error extracting links");
  }
}

// 🌟 UPDATED: EPISODE GROUPING UI LOGIC
function renderCards() {
  urlGrid.style.display = 'block'; // Changed to block for sectioning
  urlGrid.innerHTML = '';
  
  if(extractedFinalLinks.length === 0) {
    urlGrid.innerHTML = `<div style="color:var(--text-secondary); text-align:center;">No final links found!</div>`;
    copyAllBtn.style.display = 'none';
    return;
  }
  
  copyAllBtn.style.display = 'flex';
  
  // Group Links by Episode
  const groupedLinks = {};
  extractedFinalLinks.forEach(linkObj => {
      const ep = linkObj.episode && linkObj.episode !== 'Movie' ? linkObj.episode : 'Movie';
      if(!groupedLinks[ep]) groupedLinks[ep] = [];
      groupedLinks[ep].push(linkObj);
  });
  
  // Render Each Group
  Object.keys(groupedLinks).forEach(ep => {
      // Create Header for Episode
      const epHeader = document.createElement('div');
      epHeader.className = 'episode-header';
      epHeader.textContent = ep === 'Movie' ? 'Movie Links' : `${ep} Links`;
      urlGrid.appendChild(epHeader);
      
      // Create Grid for this Episode's links
      const epGrid = document.createElement('div');
      epGrid.className = 'ep-grid';
      
      groupedLinks[ep].forEach((linkObj, i) => {
          const color = CARD_COLORS[i % CARD_COLORS.length];
          const icon  = CARD_ICONS[i % CARD_ICONS.length];
          const num   = String(i + 1).padStart(2, '0');
          
          const card  = document.createElement('div');
          card.className  = 'url-card card-visible';
          card.dataset.color = color;
          card.innerHTML  = `
            <div class="card-header">
              <span class="card-header-icon">${icon}</span>
              <span class="card-title">${linkObj.server}</span>
              <span class="card-badge">#${num}</span>
            </div>
            <div class="card-body">
              <span class="url-text" title="${linkObj.url}">${linkObj.url}</span>
              <button class="copy-btn" type="button" aria-label="Copy URL" data-url="${linkObj.url}">
                ${copyIconSVG()}
              </button>
            </div>`;
            
          epGrid.appendChild(card);
      });
      
      urlGrid.appendChild(epGrid);
  });
}

// 🌟 UPDATED COPY ALL LOGIC
copyAllBtn.addEventListener('click', () => {
  if (extractedFinalLinks.length === 0) return;
  const allUrls = extractedFinalLinks.map(link => {
      let epStr = link.episode !== 'Movie' ? `[${link.episode}] ` : '';
      return `${epStr}${link.url}`;
  }).join('\n');
  
  navigator.clipboard.writeText(allUrls);
  showToast(`Copied ${extractedFinalLinks.length} URLs!`);
});

qualityTrigger.addEventListener('click', e => { 
  if(!qualityTrigger.disabled) { e.stopPropagation(); qualityBox.classList.toggle('open'); }
});

document.addEventListener('click', e => { 
  if(!qualityBox.contains(e.target)) qualityBox.classList.remove('open'); 
});

document.getElementById('scrollLeft').addEventListener('click', () => {
  sourceTrack.parentElement.scrollBy({left:-220, behavior:'smooth'});
});

document.getElementById('scrollRight').addEventListener('click', () => {
  sourceTrack.parentElement.scrollBy({left:220, behavior:'smooth'});
});

urlGrid.addEventListener('click', e => {
  const btn = e.target.closest('.copy-btn');
  if(!btn) return;
  navigator.clipboard.writeText(btn.dataset.url);
  showToast('Copied Successfully');
});

window.addEventListener('load', () => setTimeout(() => moveIndicator(document.querySelector('.source-pill.active')), 100));
window.addEventListener('resize', () => moveIndicator(document.querySelector('.source-pill.active')));
</script>
</body>
</html>
